<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Margatroid</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <noscript><p style="color:#c0caf5;text-align:center;margin-top:40vh">This application requires JavaScript.</p></noscript>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <h1>Margatroid</h1>
        <button class="sidebar-toggle" id="collapse-btn" title="Collapse sidebar">&#x2039;</button>
      </div>
      <ul id="session-list"></ul>
    </div>
    <div id="main">
      <div id="header" style="display:none">
        <button id="expand-btn" title="Show sidebar">&#x203A;</button>
        <span class="name" id="hdr-name"></span>
        <span id="hdr-status"></span>
      </div>
      <div id="placeholder">Select a session to connect</div>
      <div id="terminal-wrap" style="display:none">
        <div id="terminal"></div>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
